<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse ShopEase's product catalog. High-quality electronics, apparel, jewelry and accessories with sorting and advanced filters.">
  <title>Products Catalog | ShopEase</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/products.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        ShopEase
      </a>

      <nav class="nav-menu" id="navMenu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="products.html" class="nav-link active">Products</a>
        <a href="products.html?category=all" class="nav-link">Categories</a>
        <a href="cart.html" class="nav-link">Cart</a>
      </nav>

      <div class="nav-actions">
        <a href="cart.html" class="cart-icon-btn" aria-label="View Shopping Cart">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-badge" style="display: none;">0</span>
        </a>

        <button class="hamburger" aria-label="Toggle Menu" aria-expanded="false" aria-controls="navMenu">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="catalog-layout">
    <h1 class="catalog-title">Explore Catalog</h1>

    <section class="toolbar">
      <div class="toolbar-top">
        <div class="search-wrapper">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search catalog...">
        </div>

        <div class="sort-wrapper">
          <label for="sortSelect" class="sort-label">Sort by</label>
          <select id="sortSelect" class="sort-select">
            <option value="default">Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating-desc">Rating: High to Low</option>
          </select>
        </div>

        <div class="price-filter">
          <label class="price-filter-label">Price range</label>
          <div class="price-input-group">
            <input type="number" id="minPriceInput" class="price-input" placeholder="Min" min="0" step="0.01">
            <span class="price-divider">to</span>
            <input type="number" id="maxPriceInput" class="price-input" placeholder="Max" min="0" step="0.01">
          </div>
          <div class="price-filter-actions">
            <button type="button" class="btn btn-secondary" id="clearPriceFilterBtn">Clear</button>
            <button type="button" class="btn btn-primary" id="applyPriceFilterBtn">Apply</button>
          </div>
        </div>
      </div>

      <div class="categories-filter" id="categoriesContainer">
        <button class="filter-btn active" data-category="all">All Products</button>
      </div>
    </section>

    <section class="products-grid" id="productsGrid">
      <div class="skeleton-loader" id="skeletonLoader">
        <!-- 8 mock skeleton items -->
        <div class="skeleton-item"><div class="skeleton-box img"></div><div class="skeleton-box tag"></div><div class="skeleton-box title"></div><div class="skeleton-box title-short"></div><div class="skeleton-box rating"></div><div class="skeleton-box price"></div></div>
        <div class="skeleton-item"><div class="skeleton-box img"></div><div class="skeleton-box tag"></div><div class="skeleton-box title"></div><div class="skeleton-box title-short"></div><div class="skeleton-box rating"></div><div class="skeleton-box price"></div></div>
        <div class="skeleton-item"><div class="skeleton-box img"></div><div class="skeleton-box tag"></div><div class="skeleton-box title"></div><div class="skeleton-box title-short"></div><div class="skeleton-box rating"></div><div class="skeleton-box price"></div></div>
        <div class="skeleton-item"><div class="skeleton-box img"></div><div class="skeleton-box tag"></div><div class="skeleton-box title"></div><div class="skeleton-box title-short"></div><div class="skeleton-box rating"></div><div class="skeleton-box price"></div></div>
      </div>
    </section>

    <!-- Empty State -->
    <div id="emptyState" class="status-container" style="display: none;">
      <svg class="status-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line>
      </svg>
      <h3 class="status-title">No products found</h3>
      <p class="status-desc">We couldn't find any products matching your current search criteria.</p>
      <button class="btn btn-primary" id="resetFiltersBtn">Reset Filters</button>
    </div>

    <!-- Error State -->
    <div id="errorState" class="status-container" style="display: none;">
      <h3 class="status-title">Oops! Something went wrong</h3>
      <button class="btn btn-primary" id="retryFetchBtn">Retry Loading</button>
    </div>
  </main>

  <footer class="footer">...</footer>

  <script src="css/js/storage.js"></script>
  <script src="css/js/api.js"></script>
  <script src="css/js/search.js"></script>
  <script src="css/js/filter.js"></script>
  <script src="css/js/app.js"></script>
  <script src="css/js/products.js"></script>
</body>
</html>
